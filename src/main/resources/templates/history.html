<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Weather History</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center">
    <h1>Search History</h1>
    <a href="/" class="btn btn-secondary">Back to Search</a>
</div>
<hr>
<table class="table table-striped mt-3">
    <thead class="table-dark">
    <tr>
        <th>Location</th>
        <th>Temp</th>
        <th>Time</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="record : ${historyList}">
        <td>
            <img th:if="${record.iconCode != null}"
                 th:src="${'https://openweathermap.org/img/wn/' + record.iconCode + '@2x.png'}"
                 alt="Weather Icon" style="width: 40px; height: 40px;">

            <span th:text="${record.city}" class="align-middle">City</span><span th:if="${record.state != null and !record.state.isEmpty()}"
                                                                                 th:text="', ' + ${record.state}" class="align-middle">, State</span><span th:text="', ' + ${record.country}" class="align-middle" style="color: #666; font-size: 0.9em;">, US</span>
        </td>

        <td class="align-middle">
            <span th:text="${#numbers.formatDecimal(record.temperature, 1, 1)}">0.0</span><span th:text="${record.unitLabel}">°C</span>
        </td>

        <td class="align-middle" th:text="${#temporals.format(record.searchTime, 'yyyy-MM-dd HH:mm')}">Time</td>
    </tr>
    </tbody>
</table>
</body>
</html>
